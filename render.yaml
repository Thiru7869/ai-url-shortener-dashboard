databases:
  - name: linkpilot-db
    plan: starter
    region: oregon
    databaseName: url_shortener

services:
  - type: keyvalue
    name: linkpilot-redis
    plan: starter
    region: oregon
    maxmemoryPolicy: allkeys-lru
    ipAllowList:
      - source: 0.0.0.0/0
        description: everywhere

  - type: web
    name: linkpilot-backend
    runtime: docker
    region: oregon
    plan: starter
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: SHORT_CODE_LENGTH
        value: "7"
      - key: DATABASE_URL
        fromDatabase:
          name: linkpilot-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: linkpilot-redis
          property: connectionString
      - key: BASE_URL
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false